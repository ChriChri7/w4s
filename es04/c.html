<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Calcolatrice</title>

<style>
body {
  background: #0a0a0a;
  font-family: system-ui, sans-serif;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}


.container {
  background: #111;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}


h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #00e0ff;
}


input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  border: 1px solid #222;
  border-radius: 6px;
  background: #0f0f0f;
  color: #fff;
}


button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #00e0ff;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #00bcd4;
}


#result {
  margin-top: 20px;
  text-align: center;
  font-size: 18px;
  color: #66e0ff;
}
</style>
</head>

<body>

<div class="container">

<h2>Calcolatrice</h2>

<form id="calcForm">

  <label>Numero 1</label>
  <input type="text" id="num1">

  <label>Operazione (add, sub, mul, div)</label>
  <input type="text" id="operation">

  <label>Numero 2</label>
  <input type="text" id="num2">

  <button type="submit">Calcola</button>

</form>

<h3 id="result"></h3>

</div>

<script>
document.getElementById("calcForm").addEventListener("submit", function(event) {
  event.preventDefault();

  const num1 = parseFloat(document.getElementById("num1").value);
  const num2 = parseFloat(document.getElementById("num2").value);
  const operation = document.getElementById("operation").value.trim();
  const resultElement = document.getElementById("result");

  if (isNaN(num1) || isNaN(num2)) {
    resultElement.textContent = "Errore: inserire due numeri validi.";
    return;
  }

  let result;

  switch (operation) {
    case "add":
      result = num1 + num2;
      break;
    case "sub":
      result = num1 - num2;
      break;
    case "mul":
      result = num1 * num2;
      break;
    case "div":
      if (num2 === 0) {
        resultElement.textContent = "Errore: divisione per zero.";
        return;
      }
      result = num1 / num2;
      break;
    default:
      resultElement.textContent = "Operazione non valida.";
      return;
  }

  resultElement.textContent = "Risultato: " + result;
});
</script>

</body>
</html>
