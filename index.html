<html lang="it"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rosa Christian – 4CINF</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Syne:wght@400;600;800&amp;display=swap" rel="stylesheet">
  <style>
:root {
  --bg: #0a0a0a;
  --card: #111;
  --border: #222;
  --text: #f5f5f5;
  --muted: #888;
  --accent: #00e0ff;
}

/* Reset */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, sans-serif;
}

/* Container */
.container {
  max-width: 900px;
  margin: auto;
  padding: 60px 20px;
}

/* Header */
h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

h1 span {
  color: var(--accent);
}

.subtitle {
  color: var(--muted);
  margin-bottom: 40px;
}

/* Divider */
.divider {
  margin: 40px 0;
  border-bottom: 1px solid var(--border);
}

/* Group */
.group {
  margin-bottom: 50px;
}

.group-label {
  color: var(--accent);
  font-size: 12px;
  margin-bottom: 15px;
}

/* Cards grid */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
}

/* Card */
.card {
  display: block;
  text-decoration: none;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 10px;
  transition: 0.25s;
  position: relative;
}

/* Hover effect */
.card:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
  box-shadow: 0 10px 30px rgba(0,224,255,0.2);
}

/* Text */
.card-number {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 5px;
}

.card-title {
  font-size: 16px;
  font-weight: bold;
}

.card-desc {
  font-size: 12px;
  color: var(--muted);
  margin-top: 8px;
}

/* Badge */
.card-type {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 10px;
  color: var(--accent);
}

/* Arrow */
.card-arrow {
  position: absolute;
  bottom: 10px;
  right: 10px;
  opacity: 0.5;
}

/* Footer */
.footer {
  margin-top: 60px;
  font-size: 12px;
  color: var(--muted);
  text-align: center;
}
</style>
</head>
<body>
  <div class="orb2"></div>
  <div class="container">

    <header class="header">
      <div class="badge">Portfolio · 4CINF</div>
      <h1>Matteo<br><span>Chiappa</span></h1>
      <p class="subtitle">username: <strong>chiappa.matteo</strong></p>
    </header>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-label">Esercizi</span>
      <div class="divider-line" style="background: linear-gradient(90deg, transparent, var(--border))"></div>


    <div class="group">
      <div class="group-label">// Esercizi 4</div>
      <div class="cards">

        <a class="card" href="es04/a.js">
          <div class="card-number">ES·4A</div>
          <span class="card-type">JS</span>
          <div class="card-title">Calcolatrice Bash</div>
          <div class="card-desc">Calcolatrice a linea di comando con Bash.</div>
          <span class="card-arrow">↗</span>
        </a>

      </div>
    </div>

   


</body></html>
