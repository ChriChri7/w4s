<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Archivio Esercizi</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #e2e8f0;
        text-align: center;
    }

    h1 {
        font-size: 50px;
        margin-top: 50px;
        letter-spacing: 2px;
    }

    .subtitle {
        color: #38bdf8;
        margin-bottom: 40px;
    }

    .section {
        margin-top: 50px;
    }

    .section-title {
        font-size: 14px;
        letter-spacing: 4px;
        color: #94a3b8;
        margin-bottom: 20px;
    }

    .welcome {
        width: 60%;
        margin: auto;
        padding: 25px;
        border-radius: 15px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1);
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 25px;
        padding: 40px;
        width: 80%;
        margin: auto;
    }

    .card {
        padding: 30px;
        border-radius: 15px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1);
        transition: 0.3s;
        cursor: pointer;
    }

    .card:hover {
        transform: translateY(-10px) scale(1.03);
        box-shadow: 0 0 20px rgba(56,189,248,0.4);
    }

    a {
        text-decoration: none;
        color: inherit;
    }
</style>
</head>

<body>

<h1>Edoardo Zaffaroni</h1>
<div class="subtitle">Esercizi Scolastici</div>

<div class="section">
    <div class="section-title">ESERCIZIO 04</div>

    <div class="grid">

        <a href="es04/a.js">
            <div class="card">📦 Volume scatola</div>
        </a>

    </div>
</div>

</body>
</html>
