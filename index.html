<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rosa Christian – 4CINF</title>

<style>
:root {
  --bg: #0a0a0a;
  --card: #111;
  --border: #222;
  --text: #f5f5f5;
  --muted: #888;
  --accent: #00e0ff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, sans-serif;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 60px 20px;
}

/* HEADER */
h1 {
  font-size: 42px;
}

.subtitle {
  color: var(--accent);
  margin-bottom: 40px;
}

/* TITLE */
.section-title {
  font-size: 20px;
  margin: 30px 0;
}

/* Cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
}

.card {
  display: block;
  text-decoration: none;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 10px;
  transition: 0.25s;
  position: relative;
}

.card:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
  box-shadow: 0 10px 30px rgba(0,224,255,0.2);
}

.card-title {
  font-size: 16px;
  font-weight: bold;
}

.card-desc {
  font-size: 12px;
  color: var(--muted);
  margin-top: 8px;
}

.card-arrow {
  position: absolute;
  bottom: 10px;
  right: 10px;
  opacity: 0.5;
}

/* Lettera esercizio */
.card-letter {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 12px;
  color: var(--accent);
}
</style>
</head>

<body>

<div class="container">

  <!-- NOME -->
  <h1>Rosa Christian</h1>
  <div class="subtitle">4CINF</div>

  <!-- TITOLO -->
  <div class="section-title">Esercizio 4</div>

  <div class="cards">

    <a class="card" href="es04/a.js">
      <div class="card-letter">A</div>
      <div class="card-title">Calcolatrice Bash</div>
      <div class="card-desc">Calcolatrice a linea di comando con Bash.</div>
      <span class="card-arrow">↗</span>
    </a>

  </div>

</div>

</body>
</html>
